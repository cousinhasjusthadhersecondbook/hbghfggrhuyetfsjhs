            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .main-container {
            width: 100%;
            max-width: 380px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid rgba(14,165,233,.2);
            position: relative;
            z-index: 10;
        }

        .header {
            padding: 24px 28px 18px;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 10px;
        }

        #logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transition: transform .2s ease;
        }

        #logo:hover { transform: scale(1.05); }

        #welcomeLegend {
            font-size: 24px;
            font-weight: 600;
            color: #111827;
            margin: 0 0 8px;
        }

        .auth-note {
            font-size: 14px;
            color: #374151;
            line-height: 1.5;
        }

        .auth-note strong { color: #111827; font-weight: 600; }

        .form-container { padding: 0 28px 24px; }

        .error-message {
            background: #fef2f2;
            border: 1px solid #f87171;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 18px;
            display: none;
            animation: fadeIn .3s ease;
        }

        .error-message p {
            margin: 0;
            font-size: 12px;
            color: #dc2626;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity:0; transform: translateY(-10px); }
            to { opacity:1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 8px 38px 8px 10px;
            font-size: 13px;
            font-family: inherit;
            border: none;
            border-bottom: 2px solid #222;
            background: transparent;
            transition: border-color .2s ease;
        }

        .form-group input:focus {
            border-color: #0ea5e9;
            outline: none;
        }

        .form-group input[readonly] {
            background: #f3f4f6;
            color: #1f2937;
            cursor: not-allowed;
        }

        .toggle-password {
            position: absolute;
            right: 8px;
            top: 30px;
            cursor: pointer;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            transition: all .25s ease;
            opacity: 0;
            visibility: hidden;
        }

        .toggle-password.visible {
            opacity: 1;
            visibility: visible;
        }

        .toggle-password:hover { color: #111827; }

        .submit-btn {
            width: 100%;
            padding: 11px;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            background: #0ea5e9;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s ease;
        }

        .submit-btn:hover:not(:disabled) {
            background: #0284c7;
            transform: scale(1.02);
        }

        .submit-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 14px; height: 14px;
            margin-left: 8px;
            border: 2px solid transparent;
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

        .footer {
            background: #f3f4f6;
            border-top: 1px solid #e5e7eb;
            padding: 12px 28px;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 8px;
        }

        .footer-link {
            color: #6b7280;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            position: relative;
        }

        .footer-link:hover { color: #0ea5e9; }

        .footer-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background: #0ea5e9;
            transition: width .2s ease;
        }

        .footer-link:hover::after { width: 100%; }

        #language-select {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 12px;
            background: #fff;
            z-index: 100;
        }

</head>
